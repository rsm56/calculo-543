<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA RJ v9.0 - MOTOR ULTRA-RESILIENTE</title>
    <style>
        :root { --neon-blue: #00d2ff; --neon-yellow: #f1c40f; --bg: #0d0d0d; --card-bg: #161b22; }
        body { font-family: 'Segoe UI', monospace; background: var(--bg); color: #fff; padding: 20px; }
        .app-container { max-width: 950px; margin: auto; background: #000; padding: 25px; border-radius: 12px; border: 1px solid #30363d; }
        
        .layout-split { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 10px; }
        textarea { width: 100%; height: 160px; background: #0d1117; color: var(--neon-blue); border: 1px solid #30363d; padding: 12px; font-size: 14px; border-radius: 6px; box-sizing: border-box; resize: none; }
        
        .panel-atraso { background: #0d1117; border: 2px solid var(--neon-yellow); padding: 15px; border-radius: 6px; height: 160px; overflow-y: auto; box-sizing: border-box; }
        .panel-atraso h4 { margin: 0 0 10px 0; color: var(--neon-yellow); font-size: 14px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .item-atrasado { font-size: 12px; color: #fff; margin-bottom: 6px; padding: 6px; border-radius: 4px; background: #1c2128; border-left: 4px solid var(--neon-yellow); display: flex; justify-content: space-between; }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        input { padding: 18px; background: #0d1117; border: 1px solid #30363d; color: var(--neon-blue); font-size: 26px; text-align: center; border-radius: 6px; width: 100%; box-sizing: border-box; font-weight: bold; }
        
        .main-btn { width: 100%; padding: 22px; background: var(--neon-blue); color: #000; font-weight: bold; font-size: 20px; cursor: pointer; border: none; border-radius: 6px; text-transform: uppercase; }
        .main-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(0,210,255,0.4); }
        
        .system-controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .sys-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; color: #fff; font-weight: bold; background: #21262d; border: 1px solid #30363d; text-transform: uppercase; }

        .grid-analise { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 25px; }
        .card-vetor { background: var(--card-bg); padding: 20px; border: 1px solid #30363d; border-radius: 10px; text-align: center; border-bottom: 6px solid #30363d; }
        .sincronizado { border-color: var(--neon-blue); border-bottom-color: var(--neon-blue); background: #0d1a29; }
        .num-extraido { font-size: 42px; font-weight: bold; color: var(--neon-blue); display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <h1 style="text-align:center; color: var(--neon-blue); margin: 0 0 20px 0;">SISTEMA RJ v9.0</h1>
    
    <div class="system-controls">
        <button class="sys-btn" onclick="fazerBackup()" style="border-color: #888;">💾 SALVAR BACKUP</button>
        <button class="sys-btn" onclick="restaurarBackup()" style="border-color: var(--neon-blue);">🔄 RESTAURAR DADOS</button>
    </div>

    <div class="layout-split">
        <div>
            <label style="font-size: 12px; color: #8b949e;">COLE A LISTA COMPLETA:</label>
            <textarea id="listaInput" placeholder="Pode colar com emojis e tudo..."></textarea>
        </div>
        <div class="panel-atraso">
            <h4>🎯 ALVOS (2+ DIAS)</h4>
            <div id="itensAtrasados"><center style="color:#444; margin-top:30px;">Aguardando lista...</center></div>
        </div>
    </div>

    <div class="input-row">
        <div><input type="number" id="m3" placeholder="3º PRÊMIO"></div>
        <div><input type="number" id="sf" value="543"></div>
    </div>

    <button class="main-btn" onclick="executar()">PROCESSAR E ANALISAR</button>

    <div id="resultadoGrid" class="grid-analise"></div>
</div>

<script>
const motorAnimais = {"01":"Avestruz","02":"Aguia","03":"Burro","04":"Borboleta","05":"Cachorro","06":"Cabra","07":"Carneiro","08":"Camelo","09":"Cobra","10":"Coelho","11":"Cavalo","12":"Elefante","13":"Galo","14":"Gato","15":"Jacaré","16":"Leão","17":"Macaco","18":"Porco","19":"Pavão","20":"Peru","21":"Touro","22":"Tigre","23":"Urso","24":"Veado","25":"Vaca","00":"Vaca","97":"Vaca","98":"Vaca","99":"Vaca"};
const nomesOficiais = ["Avestruz","Aguia","Burro","Borboleta","Cachorro","Cabra","Carneiro","Camelo","Cobra","Coelho","Cavalo","Elefante","Galo","Gato","Jacaré","Leão","Macaco","Porco","Pavão","Peru","Touro","Tigre","Urso","Veado","Vaca"];

function identificarBicho(v) {
    let n = parseInt(v);
    let g, nome;
    if (n >= 1 && n <= 25) { g = n; nome = nomesOficiais[n-1]; }
    else { 
        let dezena = v.padStart(2, '0');
        // Se a dezena for maior que 25, usa a regra oficial de grupos (div 4)
        g = dezena === "00" ? 25 : Math.ceil(parseInt(dezena) / 4);
        nome = nomesOficiais[g-1];
    }
    return { g, nome };
}

function filtrarAtrasados(texto) {
    const container = document.getElementById('itensAtrasados');
    container.innerHTML = '';
    
    // NOVO REGEX: Ignora símbolos e emojis. Foca no número + Nome + "atrasado há X dias"
    // Captura: (Número do Grupo) - (Nome) atrasado há (Dias)
    const regex = /(\d{1,2})\s*-\s*([a-zA-ZáéíóúçÁÉÍÓÚÇ]+)\s*atrasado há\s*(\d{1,2})\s*dias/gi;
    
    let matches;
    let encontrados = 0;

    while ((matches = regex.exec(texto)) !== null) {
        let dias = parseInt(matches[3]);
        if (dias >= 2) {
            encontrados++;
            const div = document.createElement('div');
            div.className = 'item-atrasado';
            div.innerHTML = `<span><strong>${matches[1]} - ${matches[2].toUpperCase()}</strong></span> <span>${dias} DIAS</span>`;
            container.appendChild(div);
        }
    }

    if (encontrados === 0) {
        container.innerHTML = '<center style="color:#555; margin-top:30px;">Nenhum bicho com 2+ dias detectado.<br><small>Verifique se o texto contém "atrasado há X dias"</small></center>';
    }
}

function executar() {
    const inputArea = document.getElementById('listaInput');
    const milhar = document.getElementById('m3').value;
    const soma = parseInt(document.getElementById('sf').value);
    
    if(!milhar || !inputArea.value) return alert("Erro: Cole a lista e insira o 3º prêmio!");

    // Analisa os atrasados antes de limpar
    filtrarAtrasados(inputArea.value);

    let resSoma = (parseInt(milhar) + soma).toString().padStart(4, '0');
    if(resSoma.length > 4) resSoma = resSoma.slice(-4);
    const p = resSoma.split('');

    const extrações = [
        { t: "PONTAS (P0+P3)", v: p[0]+p[3] },
        { t: "MIOLO INV (P2+P1)", v: p[2]+p[1] },
        { t: "SOLO (P3)", v: "0"+p[3] },
        { t: "CABEÇA (P0+P1)", v: p[0]+p[1] }
    ];

    const grid = document.getElementById('resultadoGrid');
    grid.innerHTML = '';

    const listaMinuscula = inputArea.value.toLowerCase();

    extrações.forEach(ex => {
        const bicho = identificarBicho(ex.v);
        const naLista = listaMinuscula.includes(bicho.nome.toLowerCase());

        grid.innerHTML += `
            <div class="card-vetor ${naLista ? 'sincronizado' : ''}">
                <small style="color:#8b949e;">${ex.t}</small>
                <span class="num-extraido">${ex.v}</span>
                <div style="font-size:18px; font-weight:bold;">${bicho.g} - ${bicho.nome.toUpperCase()}</div>
                ${naLista ? '<div style="color:var(--neon-blue); font-size:11px; margin-top:8px; font-weight:bold;">✅ SINCRONIZADO</div>' : ''}
            </div>
        `;
    });

    inputArea.value = ''; // Limpa o campo
}

function fazerBackup() {
    localStorage.setItem('sys_rj_9', JSON.stringify({ m: document.getElementById('m3').value, s: document.getElementById('sf').value }));
    alert("Backup realizado!");
}

function restaurarBackup() {
    const b = JSON.parse(localStorage.getItem('sys_rj_9'));
    if(b) {
        document.getElementById('m3').value = b.m;
        document.getElementById('sf').value = b.s;
    }
}
</script>
</body>
</html>
